<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terasync Tech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0b0f1a;
    color: white;
}

/* Navbar */
.navbar {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 15px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo img {
    height: 35px;
}

.nav-links a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    font-weight: 500;
}

/* Hero Section */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 60px;
    position: relative;
    background: url('hero.png') center/cover no-repeat;
}

/* Dark Overlay (IMPORTANT FIX) */
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
    z-index: 1;
}

/* Content */
.hero-content {
    position: relative;
    z-index: 2;
    max-width: 600px;
    margin-top: 60px;
}

.hero h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.2;
}

.hero p {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

/* Buttons */
.buttons {
    margin-top: 30px;
}

.btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 30px;
    margin-right: 15px;
    text-decoration: none;
    font-weight: 600;
}

.call {
    background: linear-gradient(45deg, #7b2ff7, #f107a3);
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}

/* Responsive */
@media(max-width: 768px){
    .hero {
        padding: 0 20px;
        text-align: center;
        justify-content: center;
    }

    .hero h1 {
        font-size: 32px;
    }

    .navbar {
        padding: 15px 20px;
    }
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png">
    </div>

    <div class="nav-links">
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero -->
<section class="hero">
    <div class="hero-content">
        <h1>We Build High-Converting Websites</h1>
        <p>Modern, fast & mobile-friendly websites to grow your business online</p>

        <div class="buttons">
            <a href="tel:+917633801161" class="btn call">Call Now</a>
            <a href="https://wa.me/917633801161" class="btn whatsapp">WhatsApp</a>
        </div>
    </div>
</section>

</body>
</html>
